<!DOCTYPE html>
<html lang="es-AR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YoutubeDownload</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" />
    <link rel="stylesheet" href="public/css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-main">
                <h1 class="logo">Youtube<span>Download</span></h1>
                <div class="session-status" id="session-status" title="Estado de sesión de YouTube">
                    <span class="status-dot red" id="status-dot"></span>
                    <span class="status-text" id="status-text">YouTube: Desconectado</span>
                </div>
                <button id="btn-settings" class="icon-button" title="Configurar Navegador">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>
            <p class="tagline">Descarga videos de YouTube en alta calidad</p>
        </div>
        <div class="card">
            <div class="input-section">
                <div class="input-group">
                    <input type="text" id="url" placeholder="Pega la URL del video aquí..." class="input-url">
                    <button id="btn-download">🔍 Buscar</button>
                </div>
            </div>
            <div id="video-container" class="video-result"></div>
        </div>
        <div class="download-list" id="downloads-container"></div>
    </div>

    <!-- Video Player Modal -->
    <div id="video-modal" class="modal">
        <div class="modal-content">
            <button id="close-modal" class="close-button">
                <span class="material-symbols-outlined">close</span>
            </button>
            <video id="player" controls controlsList="nodownload"></video>
        </div>
    </div>

    <script src="public/js/index.js"></script>
</body>
</html>
